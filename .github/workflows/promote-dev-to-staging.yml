name: Promote Dev to Staging

# Manual promotion workflow: Promotes a validated dev deployment to staging.
# This workflow does NOT rebuild — it deploys the exact same image that ran in dev.
# Get the image URL from the CI/CD deployment summary after a successful dev deploy.

on:
  workflow_dispatch:
    inputs:
      dev_image_url:
        description: 'Full image URL from dev deployment (copy from CI/CD summary)'
        required: true
        type: string

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: southamerica-east1
  SERVICE_NAME: role-directory-staging

jobs:
  promote:
    name: Promote to Staging
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Validate image URL
        run: |
          IMAGE_URL="${{ inputs.dev_image_url }}"
          if [ -z "$IMAGE_URL" ]; then
            echo "❌ dev_image_url is required"
            exit 1
          fi
          echo "📌 Promoting image: $IMAGE_URL"

      - name: Deploy to Cloud Run (Staging)
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.GCP_REGION }}
          image: ${{ inputs.dev_image_url }}
          flags: |
            --set-env-vars=NODE_ENV=staging
            --min-instances=0
            --max-instances=2
            --cpu=1
            --memory=512Mi

      - name: Wait for deployment
        run: |
          echo "⏳ Waiting for deployment to stabilize..."
          sleep 15
          echo "✅ Deployment wait complete"

      - name: Health check
        run: |
          TOKEN=$(gcloud auth print-identity-token)
          STAGING_URL="${{ steps.deploy.outputs.url }}"

          echo "🏥 Running health check against: $STAGING_URL/api/health"

          MAX_ATTEMPTS=12
          ATTEMPT=1

          while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
            echo "📡 Health check attempt $ATTEMPT/$MAX_ATTEMPTS..."

            RESPONSE=$(curl -f -s -w "\n%{http_code}" -H "Authorization: Bearer $TOKEN" "$STAGING_URL/api/health" 2>&1 || true)
            HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
            BODY=$(echo "$RESPONSE" | head -n-1)

            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Health check passed!"
              echo "Response: $BODY"
              exit 0
            fi

            echo "⏳ Health check returned status $HTTP_CODE, retrying in 5 seconds..."
            sleep 5
            ATTEMPT=$((ATTEMPT + 1))
          done

          echo "❌ Health check failed after $((MAX_ATTEMPTS * 5)) seconds"
          exit 1

      - name: Log promotion details
        if: always()
        run: |
          STAGING_URL="${{ steps.deploy.outputs.url }}"

          # Generate unique token for stop-commands
          STOP_TOKEN=$(date +%s%N)

          echo "### 🚀 Promotion Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Dev Image** | \`${{ inputs.dev_image_url }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Triggered by** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Timestamp** | $(date -u +"%Y-%m-%d %H:%M:%S UTC") |" >> $GITHUB_STEP_SUMMARY
          echo "| **Run URL** | [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "**🌐 Staging URL:**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "::stop-commands::${STOP_TOKEN}"
          echo "${STAGING_URL}" >> $GITHUB_STEP_SUMMARY
          echo "::${STOP_TOKEN}::"
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "<details>" >> $GITHUB_STEP_SUMMARY
          echo "<summary>📋 Copy URL (if masked above)</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "::stop-commands::${STOP_TOKEN}"
          echo "${STAGING_URL}" >> $GITHUB_STEP_SUMMARY
          echo "::${STOP_TOKEN}::"
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ **Status:** Promotion successful" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 📦 Promote to Production" >> $GITHUB_STEP_SUMMARY
            echo "Run the **Promote Staging to Production** workflow with this image URL:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "${{ inputs.dev_image_url }}" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Status:** Promotion failed" >> $GITHUB_STEP_SUMMARY
          fi

          echo ""
          echo "═══════════════════════════════════════════════════════"
          echo "🚀 Promotion Summary"
          echo "═══════════════════════════════════════════════════════"
          echo "Image:         ${{ inputs.dev_image_url }}"
          echo "Staging URL:   ${STAGING_URL}"
          echo "Triggered by:  ${{ github.actor }}"
          echo "Timestamp:     $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
          echo "Run URL:       ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "═══════════════════════════════════════════════════════"
