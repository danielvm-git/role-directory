name: CI/CD - Build and Deploy to Dev

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build and Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript type check
        run: npm run type-check

      - name: Build Next.js application
        run: npm run build

      - name: Load Periodic Table Sample Data
        run: |
          echo "Downloading periodic table sample data..."
          wget -q https://raw.githubusercontent.com/neondatabase/postgres-sample-dbs/main/periodic_table.sql
          echo "Dropping existing table if it exists..."
          psql "${{ secrets.DEV_DATABASE_URL }}" -c "DROP TABLE IF EXISTS periodic_table CASCADE;"
          echo "Loading fresh data into database..."
          psql "${{ secrets.DEV_DATABASE_URL }}" -f periodic_table.sql
          echo "✅ Periodic table data loaded successfully"

      - name: Run Unit Tests
        run: npm run test:unit
        env:
          # Database configuration for integration tests (from GitHub Secrets)
          DATABASE_URL: ${{ secrets.DEV_DATABASE_URL }}
          ALLOWED_EMAILS: test@example.com,ci@example.com
          NODE_ENV: test
          PORT: 3000

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run E2E Tests
        run: npm run test:e2e
        env:
          BASE_URL: http://localhost:3000

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            test-results/
            playwright-report/
          retention-days: 30

  deploy-dev:
    name: Deploy to Dev Environment
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      image_url: ${{ steps.image.outputs.IMAGE_URL }}
      service_url: ${{ steps.get-url.outputs.SERVICE_URL }}
    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCP_REGION: southamerica-east1
      SERVICE_NAME: role-directory-dev
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run (source)
        run: |
          echo "🚀 Deploying from source (Cloud Build handles image build + push)..."
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --source . \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --set-env-vars NODE_ENV=development \
            --min-instances 0 \
            --max-instances 2 \
            --cpu 1 \
            --memory 512Mi \
            --quiet
          echo "✅ Deployed successfully"

      - name: Get Service URL
        id: get-url
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.GCP_REGION }} \
            --format 'value(status.url)')
          echo "SERVICE_URL=$SERVICE_URL" >> $GITHUB_OUTPUT
          echo "✅ Deployed to: $SERVICE_URL"

      - name: Get deployed image URL
        id: image
        run: |
          REVISION=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.GCP_REGION }} \
            --format 'value(status.latestReadyRevisionName)')
          IMAGE_URL=$(gcloud run revisions describe "$REVISION" \
            --region ${{ env.GCP_REGION }} \
            --format 'value(spec.containers[0].image)')
          echo "IMAGE_URL=$IMAGE_URL" >> $GITHUB_OUTPUT
          echo "📌 Image URL for promotion: $IMAGE_URL"

      - name: Health Check
        run: |
          SERVICE_URL="${{ steps.get-url.outputs.SERVICE_URL }}"
          echo "🏥 Running health check against: $SERVICE_URL/api/health"
          
          # Wait up to 60 seconds for service to be ready
          for i in {1..30}; do
            if curl -sf "$SERVICE_URL/api/health" > /dev/null 2>&1; then
              echo "✅ Health check passed!"
              exit 0
            fi
            echo "⏳ Waiting for service... ($i/30)"
            sleep 2
          done
          
          echo "❌ Health check failed after 60 seconds"
          echo "Note: Health check endpoint will be implemented in Story 1.6"
          echo "Deployment succeeded but health check endpoint not yet available"
          exit 1

      - name: Setup Node.js for E2E Tests
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install Dependencies for E2E Tests
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Post-Deployment E2E Tests
        run: |
          SERVICE_URL="${{ steps.get-url.outputs.SERVICE_URL }}"
          echo "🧪 Running E2E tests against deployed service: $SERVICE_URL"
          
          # Run health check tests against deployed service
          npx playwright test tests/e2e/health-check.spec.ts --reporter=list
        env:
          BASE_URL: ${{ steps.get-url.outputs.SERVICE_URL }}

      - name: Upload Post-Deployment Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: post-deployment-test-results
          path: |
            test-results/
            playwright-report/
          retention-days: 30

      - name: Deployment Summary
        if: always()
        run: |
          SERVICE_URL="${{ steps.get-url.outputs.SERVICE_URL }}"
          IMAGE_URL="${{ steps.image.outputs.IMAGE_URL }}"
          
          # Generate unique token for stop-commands
          STOP_TOKEN=$(date +%s%N)
          
          echo "### 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Parameter | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Environment** | Dev |" >> $GITHUB_STEP_SUMMARY
          echo "| **Service** | role-directory-dev |" >> $GITHUB_STEP_SUMMARY
          echo "| **Region** | southamerica-east1 |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Use stop-commands to prevent URL masking
          echo "**🌐 Service URL:**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "::stop-commands::${STOP_TOKEN}"
          echo "${SERVICE_URL}" >> $GITHUB_STEP_SUMMARY
          echo "::${STOP_TOKEN}::"
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Backup: Code block with URL (in case stop-commands doesn't work)
          echo "<details>" >> $GITHUB_STEP_SUMMARY
          echo "<summary>📋 Copy URL (if masked above)</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "::stop-commands::${STOP_TOKEN}"
          echo "${SERVICE_URL}" >> $GITHUB_STEP_SUMMARY
          echo "::${STOP_TOKEN}::"
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ **Status:** Deployment successful" >> $GITHUB_STEP_SUMMARY
            echo "✅ **Post-Deployment Tests:** Passed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 📦 Promote to Staging" >> $GITHUB_STEP_SUMMARY
            echo "Run the **Promote Dev to Staging** workflow with this image URL:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "${IMAGE_URL}" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Status:** Deployment failed" >> $GITHUB_STEP_SUMMARY
          fi

