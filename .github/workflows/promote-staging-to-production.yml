name: Promote Staging to Production

# ⚠️  PRODUCTION PROMOTION WORKFLOW ⚠️
# Promotes a validated staging deployment to PRODUCTION.
# This workflow does NOT rebuild — it deploys the exact same image that ran in staging.
# REQUIRES: Manual trigger + confirmation string + GitHub Environment approval.

on:
  workflow_dispatch:
    inputs:
      staging_image_url:
        description: 'Full image URL from staging deployment (copy from staging promotion summary)'
        required: true
        type: string
      confirmation:
        description: 'Type PROMOTE_TO_PRODUCTION to confirm'
        required: true
        type: string

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: southamerica-east1
  SERVICE_NAME: role-directory-production

jobs:
  promote:
    name: Promote to Production
    runs-on: ubuntu-latest
    environment: production  # CRITICAL: Triggers approval requirement
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate confirmation
        run: |
          if [ "${{ inputs.confirmation }}" != "PROMOTE_TO_PRODUCTION" ]; then
            echo "❌ Confirmation string does not match. Promotion cancelled."
            echo "Expected: PROMOTE_TO_PRODUCTION"
            echo "Received: ${{ inputs.confirmation }}"
            exit 1
          fi
          echo "✅ Confirmation validated"
          echo "⚠️  Proceeding with PRODUCTION promotion..."

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Validate image URL
        run: |
          IMAGE_URL="${{ inputs.staging_image_url }}"
          if [ -z "$IMAGE_URL" ]; then
            echo "❌ staging_image_url is required"
            exit 1
          fi
          echo "📌 Promoting image to PRODUCTION: $IMAGE_URL"

      - name: Deploy to Cloud Run (Production)
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.GCP_REGION }}
          image: ${{ inputs.staging_image_url }}
          flags: |
            --set-env-vars=NODE_ENV=production
            --min-instances=0
            --max-instances=2
            --cpu=1
            --memory=512Mi

      - name: Wait for deployment
        run: |
          echo "⏳ Waiting for deployment to stabilize..."
          echo "📝 Note: Production has min 2 instances (no cold start expected)"
          sleep 15
          echo "✅ Deployment wait complete"

      - name: Health check
        run: |
          TOKEN=$(gcloud auth print-identity-token)
          PRODUCTION_URL="${{ steps.deploy.outputs.url }}"

          echo "🏥 Running health check against: $PRODUCTION_URL/api/health"
          echo "📝 Note: Production has min 2 instances (no cold start expected)"

          MAX_ATTEMPTS=12
          ATTEMPT=1

          while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
            echo "📡 Health check attempt $ATTEMPT/$MAX_ATTEMPTS..."

            START_TIME=$(date +%s%3N)
            RESPONSE=$(curl -f -s -w "\n%{http_code}" -H "Authorization: Bearer $TOKEN" "$PRODUCTION_URL/api/health" 2>&1 || true)
            END_TIME=$(date +%s%3N)
            RESPONSE_TIME=$((END_TIME - START_TIME))

            HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
            BODY=$(echo "$RESPONSE" | head -n-1)

            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Health check passed!"
              echo "Response: $BODY"
              echo "Response time: ${RESPONSE_TIME}ms"
              if [ $RESPONSE_TIME -lt 100 ]; then
                echo "✅ Excellent response time (<100ms, no cold start)"
              fi
              exit 0
            fi

            echo "⏳ Health check returned status $HTTP_CODE, retrying in 5 seconds..."
            sleep 5
            ATTEMPT=$((ATTEMPT + 1))
          done

          echo "❌ Health check failed after $((MAX_ATTEMPTS * 5)) seconds"
          echo "⚠️  PRODUCTION DEPLOYMENT FAILED"
          echo "The previous production revision will continue serving traffic."
          exit 1

      - name: Log promotion details
        if: always()
        run: |
          PRODUCTION_URL="${{ steps.deploy.outputs.url }}"

          # Generate unique token for stop-commands
          STOP_TOKEN=$(date +%s%N)

          echo "### 🚀 PRODUCTION Promotion Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⚠️ **Environment:** PRODUCTION" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Staging Image** | \`${{ inputs.staging_image_url }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Triggered by** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Timestamp** | $(date -u +"%Y-%m-%d %H:%M:%S UTC") |" >> $GITHUB_STEP_SUMMARY
          echo "| **Run URL** | [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "**🌐 Production URL:**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "::stop-commands::${STOP_TOKEN}"
          echo "${PRODUCTION_URL}" >> $GITHUB_STEP_SUMMARY
          echo "::${STOP_TOKEN}::"
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "<details>" >> $GITHUB_STEP_SUMMARY
          echo "<summary>📋 Copy URL (if masked above)</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "::stop-commands::${STOP_TOKEN}"
          echo "${PRODUCTION_URL}" >> $GITHUB_STEP_SUMMARY
          echo "::${STOP_TOKEN}::"
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ **Status:** Promotion successful" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Status:** Promotion failed" >> $GITHUB_STEP_SUMMARY
          fi

          echo ""
          echo "═══════════════════════════════════════════════════════"
          echo "🚀 PRODUCTION Promotion Summary"
          echo "═══════════════════════════════════════════════════════"
          echo "Image:            ${{ inputs.staging_image_url }}"
          echo "Production URL:   ${PRODUCTION_URL}"
          echo "Triggered by:     ${{ github.actor }}"
          echo "Timestamp:        $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
          echo "Run URL:          ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo ""
          echo "⚠️  ENVIRONMENT: PRODUCTION"
          echo "═══════════════════════════════════════════════════════"
